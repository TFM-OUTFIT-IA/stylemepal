<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Log in</h2>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="input-group">
        <input 
          type="text" 
          id="username" 
          class="auth-input"
          formControlName="username" 
          placeholder="Username"
        >
        <small class="validation-error" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
          El usuario es obligatorio (mínimo 3 caracteres).
        </small>
      </div>

      <div class="input-group">
        <input 
          type="password" 
          id="password" 
          class="auth-input"
          formControlName="password" 
          placeholder="Password"
        >
        <small class="validation-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          La contraseña es obligatoria.
        </small>
      </div>

      <div *ngIf="errorMessage" class="error-alert">
        {{ errorMessage }}
      </div>

      <button type="submit" class="auth-button" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Cargando...' : 'Log in' }}
      </button>

    </form>
    
    <a routerLink="/register" class="auth-link">or, sign up</a>
  </div>
</div>
